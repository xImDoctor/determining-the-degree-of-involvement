name: CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]  # Push tags starting with v
  pull_request:
    branches: [ main, develop ]

jobs:
  # Test job - runs on all events
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
    
    - name: Install system libraries
      run: |
        sudo apt-get update && sudo apt-get install -y --no-install-recommends \
        libglib2.0-0 \
        libsm6 \
        libxext6 \
        libxrender-dev \
        libgomp1 \
        ffmpeg \
        curl
    
    - name: Install backend dependencies
      run: |
        cd backend
        pip install -e ".[dev]"
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        pip install -r requirements.txt
    
    - name: Lint with ruff
      run: |
        cd backend
        ruff check .
    
    - name: Check formatting with ruff
      run: |
        cd backend
        ruff format --check .
    
    - name: Type check with mypy
      run: |
        cd backend
        mypy app/ --warn-return-any --no-implicit-optional
    
    - name: Run tests
      run: |
        cd backend
        pytest -v

  # Build and push Docker images - only runs on push to main or version tags, and only if test passes
  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Set up QEMU for multi-arch builds (if needed)
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    # Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Login to GHCR
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Extract metadata (tags, labels) for backend Docker image
    - name: Extract metadata for backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/engagement-detection-backend
        images-lowercase: true
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}

    # Build and push backend Docker image
    - name: Build and push backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
